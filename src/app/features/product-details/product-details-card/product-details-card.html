<div class="product-details-card">
  @if(store.hasProductDetails()) {
    <pe-card>
      <div class="product-details">
        <div class="product-details__img">
          <img
            [src]="productDetails()?.image"
            [alt]="productDetails()?.title"
            aria-hidden="true"/>
        </div>
        <div class="product-details__content">
          <div class="product-details__content-header">
            <h3>{{productDetails()?.title}}</h3>
            <p>{{productDetails()?.price | currency:'ZAR':'symbol-narrow'}}</p>
          </div>
          <pe-rating [rating]="productDetails()!.rating" class="no-transform"/>
          <p class="product-details__content-description">{{productDetails()?.description}}</p>
          <div class="product-details__content-footer">
            <button class="button outline primary" (click)="goHome()">Continue shopping</button>
          </div>
        </div>
      </div>
    </pe-card>
  }

  @if (store.isLoading$()) {
    <div
      class="product-details__is-loading"
      role="status"
      aria-live="polite"
      aria-label="Loading products">
      <pe-loading-spinner />
    </div>
  }
</div>

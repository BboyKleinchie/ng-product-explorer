<div class="password-input">
  <ng-content select="input.pe-input"></ng-content>
  <button class="flat-button password-input__visibility-icon" (click)="togglePasswordVisibility($event)">
    <pe-material-icon
      [name]="`${isPasswordVisible() ? 'visibility_off': 'visibility'}`"
      class="md"/>
  </button>
</div>
